<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://i.pinimg.com/originals/6f/6c/15/6f6c1538b050072b002dbc06bedaaf90.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .todo-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      width: 370px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 6px;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f4f4f4;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
    }

    li.completed span {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>

<body>

<div class="todo-container">
  <h2>📝 My To-Do App</h2>
  <p id="counter">0 tasks (0 completed)</p>

  <input type="text" id="taskInput" placeholder="Enter a task">
  <button id="addBtn">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
  // Add button click
  document.getElementById("addBtn").addEventListener("click", addTask);

  // Enter key support
  document.getElementById("taskInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      addTask();
    }
  });

  function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if (taskText === "") {
      alert("Please enter a task");
      return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
      <span>${taskText}</span>
      <div>
        <button onclick="toggleComplete(this)">✔</button>
        <button onclick="deleteTask(this)">🗑</button>
      </div>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
    updateCounter();
  }

  function toggleComplete(btn) {
    let li = btn.parentElement.parentElement;
    li.classList.toggle("completed");
    updateCounter();
  }

  function deleteTask(btn) {
    btn.parentElement.parentElement.remove();
    updateCounter();
  }

  function updateCounter() {
    let allTasks = document.querySelectorAll("#taskList li").length;
    let completedTasks = document.querySelectorAll("#taskList li.completed").length;

    document.getElementById("counter").innerText =
      `${allTasks} tasks (${completedTasks} completed)`;
  }
</script>

</body>
</html>
