<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://i.pinimg.com/originals/6f/6c/15/6f6c1538b050072b002dbc06bedaaf90.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      transition: 0.3s;
    }

    .todo-container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 370px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .logo {
      width: 70px;
      height: 70px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 6px;
    }

    button {
      padding: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }

    li {
      background: #f4f4f4;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    li.completed span {
      text-decoration: line-through;
      color: gray;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      margin-left: 5px;
    }

    .done-btn { color: green; }
    .edit-btn { color: orange; }
    .delete-btn { color: red; }

    .clear-all {
      margin-top: 10px;
      background: red;
    }

    .toggle-dark {
      margin-top: 10px;
      background: gray;
    }

    /* Dark mode */
    body.dark {
      background: #121212;
      color: white;
    }

    body.dark .todo-container {
      background: #1e1e1e;
    }

    body.dark li {
      background: #333;
    }

    body.dark input {
      background: #444;
      color: white;
    }
  </style>
</head>

<body>

<div class="todo-container">

  <!-- ✅ LOGO -->
  <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" class="logo">

  <h2>📝 My To-Do App</h2>
  <p id="counter">0 tasks (0 completed)</p>

  <input type="text" id="taskInput" placeholder="Enter a task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <button class="clear-all" onclick="clearAll()">🗑 Clear All</button>
  <br>
  <button class="toggle-dark" onclick="toggleDarkMode()">🌙 Dark Mode</button>

</div>

<script>
  // Load tasks
  window.onload = function () {
    let savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];
    savedTasks.forEach(task => addTaskToDOM(task.text, task.completed));
    updateCounter();

    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }
  };

  function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if (taskText === "") {
      alert("Please enter a task");
      return;
    }

    addTaskToDOM(taskText, false);
    saveTasks();
    input.value = "";
    updateCounter();
  }

  function addTaskToDOM(text, completed) {
    let li = document.createElement("li");
    if (completed) li.classList.add("completed");

    li.innerHTML = `
      <span>${text}</span>
      <div>
        <button class="icon-btn done-btn" onclick="toggleComplete(this)">✔</button>
        <button class="icon-btn edit-btn" onclick="editTask(this)">✏</button>
        <button class="icon-btn delete-btn" onclick="deleteTask(this)">🗑</button>
      </div>
    `;

    document.getElementById("taskList").appendChild(li);
  }

  function toggleComplete(btn) {
    let li = btn.parentElement.parentElement;
    li.classList.toggle("completed");
    saveTasks();
    updateCounter();
  }

  function editTask(btn) {
    let li = btn.parentElement.parentElement;
    let span = li.querySelector("span");

    let newText = prompt("Edit task:", span.innerText);
    if (newText !== null && newText.trim() !== "") {
      span.innerText = newText;
      saveTasks();
    }
  }

  function deleteTask(btn) {
    btn.parentElement.parentElement.remove();
    saveTasks();
    updateCounter();
  }

  function clearAll() {
    document.getElementById("taskList").innerHTML = "";
    localStorage.removeItem("tasks");
    updateCounter();
  }

  function saveTasks() {
    let tasks = [];
    document.querySelectorAll("#taskList li").forEach(li => {
      tasks.push({
        text: li.querySelector("span").innerText,
        completed: li.classList.contains("completed")
      });
    });
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function updateCounter() {
    let allTasks = document.querySelectorAll("#taskList li").length;
    let completedTasks = document.querySelectorAll("#taskList li.completed").length;

    document.getElementById("counter").innerText =
      `${allTasks} tasks (${completedTasks} completed)`;
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark");
    let isDark = document.body.classList.contains("dark");
    localStorage.setItem("darkMode", isDark);
  }
</script>

</body>
</html>
